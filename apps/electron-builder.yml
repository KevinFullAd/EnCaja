appId: com.encaja.pos
productName: EnCaja

directories:
  output: dist
  buildResources: build

files:
  - electron/**/*
  - package.json

asar: true

extraResources:
  - from: backend/dist
    to: backend/dist

  - from: backend/prisma
    to: backend/prisma

  - from: backend/node_modules
    to: backend/node_modules

  - from: backend/public
    to: backend/public

  - from: frontend/dist
    to: frontend/dist

win:
  target: nsis
  icon: build/icon.ico

linux:
  target:
    - deb
    - AppImage
  category: Utility
  icon: build/icon.png

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

forceCodeSigning: false