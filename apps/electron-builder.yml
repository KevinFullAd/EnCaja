appId: com.encaja.pos
productName: EnCaja

directories:
  output: dist

files:
  - electron/**
  - frontend/dist/**
  - package.json

extraResources:
  - from: backend/dist
    to: backend/dist
  - from: backend/prisma
    to: backend/prisma
  - from: backend/node_modules
    to: backend/node_modules
  - from: backend/public
    to: backend/public

win:
  target: nsis
  icon: build/icon.ico

linux:
  target:
    - deb
  category: Utility
  maintainer: "Kevin Paniagua <paniagua.kevin.damian@gmail.com>"

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true